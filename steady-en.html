<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Steady Water Surface Lab</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="stage">
        <div class="canvas-wrap">
          <canvas id="steadyCanvas" aria-label="Steady open-channel water-surface profile"></canvas>
          <button id="togglePanel" class="panel-toggle" type="button">Hide settings</button>
          <button id="toggleHud" class="hud-toggle" type="button">Hide info</button>
          <div class="hud">
            <span id="profileClass">-</span>
            <span id="controlState">-</span>
            <span id="steadyReadout">-</span>
          </div>
        </div>
      </section>

      <aside class="panel" aria-label="Settings">
        <div class="brand">
          <h1>Steady Water Surface Lab</h1>
          <p>Standard-step profile and control-section model</p>
          <div class="lang-links"><a href="steady.html">日本語</a><a href="steady-en.html">English</a></div>
        </div>

        <div class="control">
          <label for="flow">Discharge <output id="flowOut"></output></label>
          <input id="flow" type="range" min="0.15" max="4.2" step="0.01" value="1.85">
        </div>

        <div class="control">
          <label for="tail">Tailwater level <output id="tailOut"></output></label>
          <input id="tail" type="range" min="0.45" max="2.8" step="0.01" value="1.35">
        </div>

        <div class="control">
          <label for="mann">Manning n <output id="mannOut"></output></label>
          <input id="mann" type="range" min="0.012" max="0.055" step="0.001" value="0.027">
        </div>

        <div class="control">
          <label for="particles">Particles <output id="particlesOut"></output></label>
          <input id="particles" type="range" min="0" max="2" step="1" value="1">
        </div>

        <div class="control">
          <label for="viewMode">View</label>
          <select id="viewMode">
            <option value="speed" selected>Velocity distribution</option>
            <option value="froude">Froude number</option>
            <option value="plain">Water surface only</option>
          </select>
        </div>

        <div class="buttons">
          <button id="addSteadyGate" type="button">Add sluice gate</button>
          <button id="deleteSteadyGate" class="secondary danger" type="button">Delete sluice gate</button>
          <button id="resetSteadyBed" type="button">Reset bed</button>
        </div>

        <div class="preset-group">
          <h2>Presets</h2>
          <div class="preset-grid">
            <button type="button" data-preset="mild-gate-low">Preset 1</button>
            <button type="button" data-preset="mild-gate-high">Preset 2</button>
            <button type="button" data-preset="mild-weir-free">Preset 3</button>
            <button type="button" data-preset="mild-weir-submerged">Preset 4</button>
            <button type="button" data-preset="steep-uniform-low">Preset 5</button>
            <button type="button" data-preset="steep-uniform-high">Preset 6</button>
          </div>
        </div>

        <div class="notes">
          <p>Drag the bed line vertically to edit the bed elevation. Drag a gate tip to change its position and opening; the upstream water level is estimated from a Torricelli-type gate relation.</p>
        </div>
      </aside>
    </main>

    <script src="steady.js"></script>
  </body>
</html>
